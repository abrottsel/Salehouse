name: Deploy to ZemPlus (Moscow)

# Triggers a signed webhook deploy on every push to main. The server
# (zem-plus.ru/api/deploy) verifies the HMAC-SHA256 signature against
# the shared DEPLOY_SECRET, then runs `deploy/deploy.sh` which tarball-
# syncs the repo, builds Next.js, and pm2 reloads the `zemplus` process.
#
# Why a webhook and not SSH: inbound SSH :22 to the Aeza Moscow box is
# unreliable (banner-exchange timeouts from most networks). The deploy
# endpoint runs over Cloudflare-proxied HTTPS 443, which is rock solid
# and independent of local VPN / NAT / firewall state on both sides.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-zemplus-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Dispatch webhook deploy
    runs-on: ubuntu-latest
    steps:
      - name: Compute HMAC signature and POST to /api/deploy
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          DEPLOY_URL: https://zem-plus.ru/api/deploy
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SECRET}" ]; then
            echo "::error::DEPLOY_SECRET is empty — set the repository secret"
            exit 1
          fi

          payload=$(jq -n \
            --arg ref "$REF_NAME" \
            --arg sha "$SHA" \
            --arg actor "$ACTOR" \
            --arg run_id "$RUN_ID" \
            '{ref:$ref, sha:$sha, actor:$actor, run_id:$run_id}')

          sig=$(printf '%s' "$payload" \
            | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex \
            | awk '{print $NF}')

          echo "Dispatching to $DEPLOY_URL"
          echo "ref=$REF_NAME sha=${SHA:0:7} actor=$ACTOR"

          http=$(curl -sS -o /tmp/deploy-response.json -w '%{http_code}' \
            --max-time 30 \
            -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=${sig}" \
            --data "$payload") || http="000"

          echo "HTTP ${http}"
          cat /tmp/deploy-response.json || true
          echo

          if [ "$http" != "200" ]; then
            echo "::error::Deploy dispatch failed (HTTP $http)"
            exit 1
          fi

      - name: Poll deploy log
        # Poll GET /api/deploy every 10s for up to 5 min. The server
        # tails deploy.log and returns plain text; we watch for the
        # success / failure markers emitted by deploy.sh.
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          DEPLOY_URL: https://zem-plus.ru/api/deploy
        run: |
          set -uo pipefail
          sig_empty=$(printf '' \
            | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex \
            | awk '{print $NF}')

          last_len=0
          for i in $(seq 1 30); do
            body=$(curl -sS --max-time 10 \
              -H "X-Signature-256: sha256=${sig_empty}" \
              "$DEPLOY_URL" || true)

            if [ -n "$body" ]; then
              new_len=${#body}
              if [ "$new_len" -gt "$last_len" ]; then
                echo "$body" | tail -c $((new_len - last_len))
                last_len=$new_len
              fi

              if echo "$body" | grep -qE '✓ Deploy complete'; then
                echo "::notice::Deploy complete"
                exit 0
              fi
              if echo "$body" | grep -qE '✗ FAILED'; then
                echo "::error::Deploy failed on the server — see log above"
                exit 1
              fi
            fi
            sleep 10
          done

          echo "::warning::Polling timed out after 5 min — deploy may still be running"
