services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: salehouse
      POSTGRES_PASSWORD: salehouse_secret_2024
      POSTGRES_DB: salehouse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://salehouse:salehouse_secret_2024@db:5432/salehouse"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  postgres_data:
