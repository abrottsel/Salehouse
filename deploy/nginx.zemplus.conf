# ───────────────────────────────────────────────────────────────────────────
# Nginx config for ZemPlus (Next.js, port 3001)
#
# Install:
#   sudo cp deploy/nginx.zemplus.conf /etc/nginx/sites-available/zemplus
#   sudo ln -s /etc/nginx/sites-available/zemplus /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# When you get a domain later, replace `server_name _;` with:
#   server_name zemplus.ru www.zemplus.ru;
# and run:
#   sudo certbot --nginx -d zemplus.ru -d www.zemplus.ru
# ───────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name _;     # catch-all; change to a domain when you have one

    client_max_body_size 20M;

    # gzip — speed up text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml;

    # ─── Long-cache for hashed static assets ────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Village photos served straight from disk (skip Next, save RAM) ─
    location /villages/ {
        alias /var/www/zemplus/public/villages/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri @nextjs;
    }

    location @nextjs {
        proxy_pass http://127.0.0.1:3001;
    }

    # ─── Everything else → Next.js ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
